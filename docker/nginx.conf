worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
  access_log /var/log/nginx/access.log main;

  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 50m;

  # ─── Security headers ──────────────────────────────────────────────────────
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # ─── Gzip ──────────────────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css application/json application/javascript
             text/xml application/xml text/javascript image/svg+xml;

  # ─── Rate limiting ─────────────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m   rate=30r/s;
  limit_req_zone $binary_remote_addr zone=submit:10m rate=5r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m  rate=10r/m;

  upstream web {
    server web:3000;
    keepalive 32;
  }

  upstream api {
    server api:4000;
    keepalive 32;
  }

  server {
    listen 80;
    server_name _;

    # ─── Health check (untuk GCP Load Balancer / uptime monitoring) ──────────
    location /healthz {
      access_log off;
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }

    # ─── Auth routes — rate limited ──────────────────────────────────────────
    location /api/auth/ {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Form submit — strict rate limit ─────────────────────────────────────
    location /api/trpc/response.submit {
      limit_req zone=submit burst=10 nodelay;
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ─── API (tRPC + REST) ───────────────────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=50 nodelay;
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    # ─── Next.js static assets — cache agresif ───────────────────────────────
    location /_next/static/ {
      proxy_pass http://web;
      proxy_http_version 1.1;
      add_header Cache-Control "public, max-age=31536000, immutable";
      access_log off;
    }

    # ─── Next.js app ─────────────────────────────────────────────────────────
    location / {
      proxy_pass http://web;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }
  }
}
